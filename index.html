<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحويل الكلام إلى نص</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
        }

        h1 {
            color: #fff;
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .mic-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .mic-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, #6c63ff, #4834d4);
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(108, 99, 255, 0.4);
            position: relative;
        }

        .mic-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(108, 99, 255, 0.6);
        }

        .mic-btn.listening {
            background: linear-gradient(145deg, #ff4757, #e84118);
            box-shadow: 0 8px 30px rgba(255, 71, 87, 0.5);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.6); }
            50% { box-shadow: 0 0 0 20px rgba(255, 71, 87, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }

        .status {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            margin-bottom: 25px;
            min-height: 28px;
        }

        .status.active {
            color: #ff4757;
            font-weight: 600;
        }

        .language-select {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
            gap: 10px;
            align-items: center;
        }

        .language-select label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
        }

        .language-select select {
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
        }

        .language-select select option {
            background: #302b63;
            color: #fff;
        }

        .output-box {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .output-box p {
            color: #fff;
            font-size: 1.1rem;
            line-height: 2;
        }

        .output-box .interim {
            color: rgba(255, 255, 255, 0.4);
            font-style: italic;
        }

        .output-box .placeholder {
            color: rgba(255, 255, 255, 0.2);
            text-align: center;
            margin-top: 70px;
            font-size: 1rem;
        }

        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 10px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .action-btn.copy-btn {
            background: rgba(108, 99, 255, 0.3);
            border-color: rgba(108, 99, 255, 0.5);
        }

        .action-btn.copy-btn:hover {
            background: rgba(108, 99, 255, 0.5);
        }

        .error-msg {
            background: rgba(255, 71, 87, 0.15);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 12px;
            padding: 15px;
            color: #ff6b7a;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }

        .output-box::-webkit-scrollbar {
            width: 6px;
        }

        .output-box::-webkit-scrollbar-track {
            background: transparent;
        }

        .output-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px 18px;
            }
            h1 {
                font-size: 1.4rem;
            }
            .mic-btn {
                width: 80px;
                height: 80px;
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎙️ تحويل الكلام إلى نص</h1>
        <p class="subtitle">اضغط على زر الميكروفون وابدأ بالتحدث</p>

        <div class="language-select">
            <label for="lang">اللغة:</label>
            <select id="lang">
                <option value="ar-SA">العربية (السعودية)</option>
                <option value="ar-EG">العربية (مصر)</option>
                <option value="ar-MA">العربية (المغرب)</option>
                <option value="en-US">English (US)</option>
                <option value="en-GB">English (UK)</option>
                <option value="fr-FR">Français</option>
                <option value="es-ES">Español</option>
                <option value="de-DE">Deutsch</option>
                <option value="tr-TR">Türkçe</option>
                <option value="ur-PK">اردو</option>
            </select>
        </div>

        <div class="mic-container">
            <button class="mic-btn" id="micBtn" onclick="toggleListening()">🎤</button>
        </div>

        <div class="status" id="status">اضغط على الميكروفون للبدء</div>

        <div class="error-msg" id="errorMsg"></div>

        <div class="output-box" id="outputBox">
            <p class="placeholder" id="placeholder">سيظهر النص هنا...</p>
            <p id="finalText"></p>
            <p class="interim" id="interimText"></p>
        </div>

        <div class="actions">
            <button class="action-btn copy-btn" onclick="copyText()">📋 نسخ النص</button>
            <button class="action-btn" onclick="clearText()">🗑️ مسح النص</button>
        </div>
    </div>

    <script>
        let recognition = null;
        let isListening = false;
        let fullTranscript = '';

        const micBtn = document.getElementById('micBtn');
        const statusEl = document.getElementById('status');
        const finalTextEl = document.getElementById('finalText');
        const interimTextEl = document.getElementById('interimText');
        const placeholderEl = document.getElementById('placeholder');
        const errorMsgEl = document.getElementById('errorMsg');
        const langSelect = document.getElementById('lang');
        const outputBox = document.getElementById('outputBox');

        function showError(msg) {
            errorMsgEl.textContent = msg;
            errorMsgEl.style.display = 'block';
            setTimeout(() => { errorMsgEl.style.display = 'none'; }, 5000);
        }

        function initRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

            if (!SpeechRecognition) {
                showError('⚠️ متصفحك لا يدعم التعرف على الكلام. يُرجى استخدام متصفح Google Chrome.');
                return false;
            }

            recognition = new SpeechRecognition();
            recognition.lang = langSelect.value;
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = function(event) {
                let interim = '';
                let final = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        final += transcript + ' ';
                    } else {
                        interim += transcript;
                    }
                }

                if (final) {
                    fullTranscript += final;
                    finalTextEl.textContent = fullTranscript;
                }

                interimTextEl.textContent = interim;
                placeholderEl.style.display = 'none';
                outputBox.scrollTop = outputBox.scrollHeight;
            };

            recognition.onerror = function(event) {
                console.error('Speech recognition error:', event.error);
                if (event.error === 'not-allowed') {
                    showError('⚠️ يُرجى السماح بالوصول إلى الميكروفون من إعدادات المتصفح.');
                } else if (event.error === 'no-speech') {
                    showError('⚠️ لم يتم التقاط أي كلام. حاول مرة أخرى.');
                } else if (event.error === 'network') {
                    showError('⚠️ خطأ في الشبكة. تحقق من اتصالك بالإنترنت.');
                } else {
                    showError('⚠️ حدث خطأ: ' + event.error);
                }
                stopListening();
            };

            recognition.onend = function() {
                if (isListening) {
                    // Auto-restart if still supposed to be listening
                    try {
                        recognition.lang = langSelect.value;
                        recognition.start();
                    } catch (e) {
                        stopListening();
                    }
                }
            };

            return true;
        }

        function toggleListening() {
            if (isListening) {
                stopListening();
            } else {
                startListening();
            }
        }

        function startListening() {
            if (!initRecognition()) return;

            try {
                recognition.start();
                isListening = true;
                micBtn.classList.add('listening');
                micBtn.textContent = '⏹️';
                statusEl.textContent = '🔴 جارٍ الاستماع...';
                statusEl.classList.add('active');
            } catch (e) {
                showError('⚠️ حدث خطأ أثناء بدء الاستماع.');
            }
        }

        function stopListening() {
            isListening = false;
            if (recognition) {
                recognition.stop();
            }
            micBtn.classList.remove('listening');
            micBtn.textContent = '🎤';
            statusEl.textContent = 'اضغط على الميكروفون للبدء';
            statusEl.classList.remove('active');
            interimTextEl.textContent = '';
        }

        function copyText() {
            const text = fullTranscript.trim();
            if (!text) {
                showError('لا يوجد نص لنسخه.');
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.copy-btn');
                const original = btn.textContent;
                btn.textContent = '✅ تم النسخ!';
                setTimeout(() => { btn.textContent = original; }, 2000);
            }).catch(() => {
                // Fallback
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                const btn = document.querySelector('.copy-btn');
                btn.textContent = '✅ تم النسخ!';
                setTimeout(() => { btn.textContent = '📋 نسخ النص'; }, 2000);
            });
        }

        function clearText() {
            fullTranscript = '';
            finalTextEl.textContent = '';
            interimTextEl.textContent = '';
            placeholderEl.style.display = 'block';
        }

        langSelect.addEventListener('change', function() {
            if (isListening) {
                stopListening();
                setTimeout(startListening, 300);
            }
        });
    </script>

</body>
</html>
