<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Listening AI</title>
</head>

<body style="text-align:center; font-family:sans-serif; background:#0A1F44; color:white;">

<h2>🎤 Listening AI</h2>

<button onclick="start()">ابدأ</button>
<button onclick="stop()">إيقاف</button>

<div id="live" style="margin:20px; background:white; color:black; padding:10px;"></div>

<script>

let recognition;
let buffer = "";
let timer;

async function correct(text) {
    const res = await fetch("/correct", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ text })
    });
    const data = await res.json();
    return data.corrected;
}

async function finalize() {
    if (buffer.length > 5) {
        const fixed = await correct(buffer);
        document.getElementById("live").innerText = fixed;
        buffer = "";
    }
}

function start() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

    recognition = new SR();
    recognition.lang = "en-US";
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onresult = (e) => {
        let text = "";

        for (let i = e.resultIndex; i < e.results.length; i++) {
            text += e.results[i][0].transcript;
        }

        buffer = text;
        document.getElementById("live").innerText = text;

        clearTimeout(timer);
        timer = setTimeout(finalize, 2000);
    };

    recognition.start();
}

function stop() {
    recognition.stop();
}

</script>

</body>
</html>
