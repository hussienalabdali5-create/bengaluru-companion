<script>
    let recognition;
    let isListening = false;
    let lastFinalTranscript = ""; // لمنع تكرار آخر جملة نهائية

    document.getElementById('start-btn').addEventListener('click', () => {
        if (!('webkitSpeechRecognition' in window)) {
            alert("عذراً، متصفحك لا يدعم خاصية التعرف على الصوت.");
            return;
        }

        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true; // نسمح بالنتائج المؤقتة للعرض فقط
        recognition.lang = 'en-US'; 

        isListening = true;
        document.getElementById('start-btn').disabled = true;
        document.getElementById('stop-btn').disabled = false;
        document.getElementById('mic-icon').className = 'mic-icon active';
        document.getElementById('status-text').textContent = 'جاري الاستماع للمحيط...';

        recognition.onresult = (event) => {
            let interimTranscript = '';
            
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                const transcript = event.results[i][0].transcript.trim();
                
                if (event.results[i].isFinal) {
                    // التحقق من أن الجملة ليست تكراراً لما قبلها مباشرة وليست فارغة
                    if (transcript !== lastFinalTranscript && transcript.length > 2) {
                        addUniqueSentence(transcript);
                        lastFinalTranscript = transcript;
                    }
                    interimTranscript = ""; // تصغير النص المؤقت بعد الاعتماد
                } else {
                    interimTranscript += transcript;
                }
            }

            // تحديث واجهة العرض اللحظي فقط
            if (interimTranscript) {
                document.getElementById('live-box').textContent = interimTranscript;
            }
        };

        recognition.onerror = (e) => {
            console.error("Recognition Error: ", e.error);
            if(e.error === 'no-speech') {
                document.getElementById('status-text').textContent = 'لم يتم اكتشاف صوت، حاول مجدداً...';
            }
        };

        recognition.onend = () => {
            // إعادة التشغيل تلقائياً لضمان استمرار الاستماع للمحيط
            if (isListening) {
                try { recognition.start(); } catch(e) {}
            }
        };

        recognition.start();
    });

    document.getElementById('stop-btn').addEventListener('click', () => {
        isListening = false;
        if (recognition) {
            recognition.stop();
        }
        document.getElementById('start-btn').disabled = false;
        document.getElementById('stop-btn').disabled = true;
        document.getElementById('mic-icon').className = 'mic-icon';
        document.getElementById('status-text').textContent = 'تم إيقاف الاستماع.';
        document.getElementById('live-box').textContent = '⏹️ توقف.';
    });

    function addUniqueSentence(text) {
        const historyList = document.getElementById('history-list');
        const time = new Date().toLocaleTimeString('ar-SA');
        
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerHTML = `
            <div class="time">${time}</div>
            <div class="text">${text}</div>
        `;
        
        // إضافته في البداية
        historyList.insertBefore(item, historyList.firstChild);
        
        // حفظ في المصفوفة المحلية (لأغراض التنزيل لاحقاً)
        allSentences.unshift({ time, text });
        updateStats();
    }
</script>
