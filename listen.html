<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Listening Pro</title>

<style>
body {
    font-family: sans-serif;
    background: #0A1F44;
    color: white;
    text-align: center;
    padding: 20px;
}
.container { max-width: 500px; margin: auto; }

.btn {
    padding: 12px 20px;
    border: none;
    border-radius: 20px;
    margin: 5px;
    cursor: pointer;
}
.start { background: orange; }
.stop { background: red; }

.live-box {
    background: white;
    color: black;
    padding: 15px;
    margin-top: 10px;
    border-radius: 10px;
    min-height: 50px;
}
.saved-item {
    background: #eee;
    color: black;
    margin: 5px;
    padding: 8px;
    border-radius: 6px;
}
</style>
</head>

<body>
<div class="container">

<h2>🎤 Listening Pro</h2>

<button id="start" class="btn start">ابدأ</button>
<button id="stop" class="btn stop" disabled>إيقاف</button>

<div id="live" class="live-box">...</div>

<h3>الجمل</h3>
<div id="saved"></div>

</div>

<script>

// ============================
// SmartBuffer (محسن)
// ============================
class SmartBuffer {
    constructor() {
        this.words = [];
    }

    addWords(words) {
        for (let w of words) {
            const last = this.words[this.words.length - 1];
            if (!last || last.toLowerCase() !== w.toLowerCase()) {
                this.words.push(w);
            }
        }
    }

    getText() {
        return this.words.join(" ");
    }

    reset() {
        this.words = [];
    }

    isEmpty() {
        return this.words.length === 0;
    }
}

// ============================
// Storage (مع limit)
// ============================
const MAX_ITEMS = 300;
const KEY = "listen_pro_v1";

function load() {
    return JSON.parse(localStorage.getItem(KEY) || "[]");
}

function save(data) {
    localStorage.setItem(KEY, JSON.stringify(data));
}

let saved = load();

function addSentence(text) {
    text = text.trim();
    if (text.length < 5) return;

    if (saved.length > 0 && saved[saved.length - 1].text === text) return;

    saved.push({
        text,
        time: new Date().toLocaleTimeString()
    });

    if (saved.length > MAX_ITEMS) {
        saved.shift();
    }

    save(saved);
    render();
}

// ============================
// UI
// ============================
const live = document.getElementById("live");
const savedDiv = document.getElementById("saved");

function render() {
    savedDiv.innerHTML = "";
    saved.slice(-20).forEach(s => {
        const div = document.createElement("div");
        div.className = "saved-item";
        div.textContent = `[${s.time}] ${s.text}`;
        savedDiv.appendChild(div);
    });
}

render();

// ============================
// Speech Engine
// ============================
let recognition = null;
let listening = false;
let timer = null;
const buffer = new SmartBuffer();

function finalize() {
    if (!buffer.isEmpty()) {
        addSentence(buffer.getText());
        buffer.reset();
    }
}

// ============================
// Start
// ============================
document.getElementById("start").onclick = () => {

    if (!("webkitSpeechRecognition" in window || "SpeechRecognition" in window)) {
        alert("المتصفح غير مدعوم");
        return;
    }

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

    recognition = new SR();
    recognition.lang = "en-US";
    recognition.continuous = true;
    recognition.interimResults = true;

    listening = true;

    recognition.onresult = (e) => {
        let newWords = [];

        for (let i = e.resultIndex; i < e.results.length; i++) {
            if (e.results[i].isFinal) {
                newWords.push(...e.results[i][0].transcript.trim().split(/\s+/));
            }
        }

        if (newWords.length) {
            buffer.addWords(newWords);

            clearTimeout(timer);
            timer = setTimeout(finalize, 2500);
        }

        let interim = "";
        for (let i = e.resultIndex; i < e.results.length; i++) {
            if (!e.results[i].isFinal) {
                interim += e.results[i][0].transcript;
            }
        }

        live.textContent = (buffer.getText() + " " + interim).trim();
    };

    recognition.onerror = (e) => {
        console.warn(e.error);
        finalize();
    };

    recognition.onend = () => {
        if (listening) {
            setTimeout(() => {
                try { recognition.start(); } catch {}
            }, 500);
        }
    };

    recognition.start();

    document.getElementById("start").disabled = true;
    document.getElementById("stop").disabled = false;
};

// ============================
// Stop
// ============================
document.getElementById("stop").onclick = () => {
    listening = false;

    if (recognition) {
        recognition.abort();
        recognition = null;
    }

    clearTimeout(timer);
    finalize();

    document.getElementById("start").disabled = false;
    document.getElementById("stop").disabled = true;

    live.textContent = "تم الإيقاف";
};

</script>
</body>
</html>
