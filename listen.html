<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استمع للمحيط | Hussein Med English</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0A1F44 0%, #1a3a6b 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }
        
        .container { max-width: 500px; margin: 0 auto; }
        h1 { color: #00BCD4; margin-bottom: 5px; font-size: 1.5em; }
        .subtitle { opacity: 0.8; margin-bottom: 20px; font-size: 0.9em; }
        
        .nav-bar { margin-bottom: 20px; }
        .nav-btn {
            background: rgba(255,255,255,0.15); color: white;
            border: 2px solid rgba(255,255,255,0.3); padding: 10px 20px;
            border-radius: 25px; font-size: 0.95em; cursor: pointer;
            text-decoration: none; display: inline-block; margin: 5px; transition: all 0.3s;
        }
        .nav-btn:hover, .nav-btn.active { background: #00BCD4; border-color: #00BCD4; color: #0A1F44; font-weight: bold; }
        
        .listening-card { background: white; color: #333; border-radius: 20px; padding: 25px; margin: 15px 0; }
        .mic-icon { font-size: 3.5em; margin: 15px 0; transition: all 0.3s; }
        .mic-icon.listening { animation: pulse 0.8s infinite; color: #ff0000; }
        @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.15);} }
        
        .btn {
            border: none; padding: 14px 28px; border-radius: 30px;
            font-size: 1em; cursor: pointer; margin: 5px; font-weight: bold; transition: all 0.3s;
        }
        .btn-start { background: #FF6F00; color: white; font-size: 1.2em; }
        .btn-stop { background: #f44336; color: white; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        
        .live-box {
            background: #fafafa; border-radius: 15px; padding: 18px; margin: 15px 0;
            min-height: 60px; font-size: 1.1em; text-align: left; direction: ltr;
            border: 3px dashed #ddd; transition: all 0.3s; word-wrap: break-word;
        }
        .live-box.active { border-color: #ff6f00; background: #fff8f0; }
        
        .status-row {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.8em; color: #888; margin-top: 5px;
        }
        
        .saved-box { background: white; color: #333; border-radius: 20px; padding: 20px; margin: 15px 0; text-align: left; direction: ltr; }
        .saved-box h3 { color: #0A1F44; margin-bottom: 10px; text-align: center; }
        .saved-item { background: #f0f8ff; border-radius: 8px; padding: 10px; margin: 6px 0; border-left: 4px solid #00BCD4; font-size: 0.9em; }
        .badge { background: #00BCD4; color: white; border-radius: 10px; padding: 2px 8px; font-size: 0.7em; margin-right: 8px; }
        .btn-download { background: #2196F3; color: white; }
        
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #4CAF50; color: white; padding: 12px 25px;
            border-radius: 30px; font-weight: bold; z-index: 999;
            animation: fadeInOut 3s forwards; font-size: 0.9em;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; bottom: 0; }
            10% { opacity: 1; bottom: 20px; }
            80% { opacity: 1; bottom: 20px; }
            100% { opacity: 0; bottom: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👂 استمع للمحيط</h1>
        <p class="subtitle">Hussein Med English | محادثات طبيعية بدون تكرار</p>
        
        <div class="nav-bar">
            <a href="index.html" class="nav-btn">🏠 الرئيسية</a>
            <a href="listen.html" class="nav-btn active">👂 استمع للمحيط</a>
        </div>
        
        <div class="listening-card">
            <div class="mic-icon" id="mic-icon">🎤</div>
            <button class="btn btn-start" id="start-btn">🎧 ابدأ الاستماع المستمر</button>
            <button class="btn btn-stop" id="stop-btn" disabled>⏹️ إيقاف</button>
            
            <div class="live-box" id="live-box">
                اضغط "ابدأ الاستماع" وتكلم بشكل طبيعي...
            </div>
            
            <div class="status-row">
                <span id="status-text">في انتظار البدء...</span>
                <span>📝 <span id="live-count">0</span> جملة</span>
            </div>
        </div>
        
        <div class="saved-box">
            <h3>📝 الجمل المستخرجة <span id="saved-count">(0)</span></h3>
            <div id="saved-list">
                <p style="color:#999;text-align:center;">لم تُستخرج أي جمل بعد...</p>
            </div>
            <button class="btn btn-download" id="download-btn">📥 تحميل كملف TXT</button>
            <button class="btn" id="clear-btn" style="background:#f44336;color:white;">🗑️ مسح الكل</button>
        </div>
    </div>

    <script>
        // =============================================
        // التخزين
        // =============================================
        const STORAGE_KEY = 'bengaluru_listen_final';
        
        function loadSaved() { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : []; }
        function saveAll(arr) { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }
        
        let savedSentences = loadSaved();
        
        function addUniqueSentence(text) {
            const clean = text.trim();
            if (clean.length < 5) return false;
            
            // 🆕 الفلتر الذكي: 1. لا تطابق الجملة الأخيرة
            if (savedSentences.length > 0) {
                const last = savedSentences[savedSentences.length - 1].text;
                // إذا كانت الجملة الجديدة مطابقة للأخيرة، لا نحفظ
                if (clean === last) return false;
                // إذا كانت الجملة الجديدة تحتوي على الأخيرة (أطول منها)، نستبدل
                if (clean.includes(last) && clean.length > last.length) {
                    savedSentences[savedSentences.length - 1] = {
                        time: new Date().toLocaleString('ar-SA', { hour:'2-digit', minute:'2-digit', second:'2-digit', year:'numeric', month:'2-digit', day:'2-digit' }),
                        text: clean
                    };
                    saveAll(savedSentences);
                    updateSavedDisplay();
                    return true;
                }
                // إذا كانت الأخيرة تحتوي على الجملة الجديدة (الجديدة أقصر)، لا نحفظ
                if (last.includes(clean)) return false;
            }
            
            const now = new Date();
            const timeStr = now.toLocaleString('ar-SA', { hour:'2-digit', minute:'2-digit', second:'2-digit', year:'numeric', month:'2-digit', day:'2-digit' });
            savedSentences.push({ time: timeStr, text: clean });
            saveAll(savedSentences);
            updateSavedDisplay();
            return true;
        }
        
        function updateSavedDisplay() {
            const list = document.getElementById('saved-list');
            document.getElementById('saved-count').textContent = '(' + savedSentences.length + ')';
            document.getElementById('live-count').textContent = savedSentences.length;
            
            if (savedSentences.length === 0) {
                list.innerHTML = '<p style="color:#999;text-align:center;">لم تُستخرج أي جمل بعد...</p>';
                return;
            }
            
            let html = '';
            const recent = savedSentences.slice(-20);
            for (const s of recent) {
                html += `<div class="saved-item"><span class="badge">${s.time}</span> ${s.text}</div>`;
            }
            if (savedSentences.length > 20) html += `<p style="color:#999;text-align:center;">... و ${savedSentences.length - 20} جملة أقدم</p>`;
            list.innerHTML = html;
        }
        
        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast'; t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
        
        document.getElementById('download-btn').addEventListener('click', () => {
            if (savedSentences.length === 0) { alert('لا توجد جمل.'); return; }
            let txt = '=== جلسة استماع المحيط ===\nHussein Med English\nإجمالي الجمل: ' + savedSentences.length + '\n' + '='.repeat(40) + '\n\n';
            for (const s of savedSentences) {
                txt += `[${s.time}]\n${s.text}\n${'-'.repeat(30)}\n`;
            }
            const blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'استماع_المحيط_' + new Date().toISOString().slice(0,10) + '.txt';
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        });
        
        document.getElementById('clear-btn').addEventListener('click', () => {
            if (confirm('مسح كل الجمل (' + savedSentences.length + ' جملة)؟')) {
                savedSentences.length = 0; saveAll(savedSentences); updateSavedDisplay();
            }
        });
        
        updateSavedDisplay();
        
        // =============================================
        // 🆕 الاستماع المستمر + فلتر ذكي
        // =============================================
        let recognition = null;
        let isListening = false;
        let pauseTimer = null;
        let currentSentence = '';

        document.getElementById('start-btn').addEventListener('click', () => {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                alert('استخدم Google Chrome.'); return;
            }
            
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (recognition) { recognition.abort(); recognition = null; }
            
            recognition = new SR();
            recognition.lang = 'en-US';
            recognition.interimResults = true;
            recognition.continuous = true;
            
            document.getElementById('live-box').textContent = '🎧 جاري الاستماع... تكلم بشكل طبيعي';
            document.getElementById('live-box').className = 'live-box active';
            document.getElementById('mic-icon').className = 'mic-icon listening';
            document.getElementById('status-text').textContent = '🟢 يستمع...';
            document.getElementById('start-btn').disabled = true;
            document.getElementById('stop-btn').disabled = false;
            isListening = true;
            currentSentence = '';
            
            function finalizeSentence() {
                const clean = currentSentence.trim();
                if (clean.length >= 5) {
                    const added = addUniqueSentence(clean);
                    if (added) showToast('✅ حُفظت: ' + clean.substring(0, 50) + (clean.length > 50 ? '...' : ''));
                }
                currentSentence = '';
            }
            
            recognition.onresult = (event) => {
                // نجمع كل النتائج النهائية من هذه الدفعة
                let newFinalText = '';
                
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        newFinalText += event.results[i][0].transcript + ' ';
                    }
                }
                
                // إذا وصلت كلمات نهائية جديدة، أضفها للجملة الحالية
                if (newFinalText.trim().length > 0) {
                    currentSentence += newFinalText;
                    
                    // عرض النص الحي
                    document.getElementById('live-box').textContent = currentSentence.trim();
                    
                    // إلغاء المؤقت السابق
                    if (pauseTimer) clearTimeout(pauseTimer);
                    
                    // مؤقت جديد: بعد 2.5 ثانية صمت، نحفظ الجملة
                    pauseTimer = setTimeout(() => {
                        finalizeSentence();
                        document.getElementById('live-box').textContent = '🎧 يستمع للجملة التالية...';
                    }, 2500);
                }
                
                // عرض النص المؤقت (interim) على الشاشة
                let interimText = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (!event.results[i].isFinal) {
                        interimText += event.results[i][0].transcript;
                    }
                }
                
                const displayText = (currentSentence + ' ' + interimText).trim();
                if (displayText) {
                    document.getElementById('live-box').textContent = displayText;
                }
            };
            
            recognition.onerror = (e) => {
                if (e.error === 'no-speech') {
                    document.getElementById('status-text').textContent = '🎧 لم يُسمع كلام...';
                } else if (e.error !== 'aborted') {
                    document.getElementById('status-text').textContent = '⚠️ ' + e.error;
                }
            };
            
            recognition.onend = () => {
                // حفظ آخر جملة قبل إعادة التشغيل
                if (currentSentence.trim().length >= 5) {
                    finalizeSentence();
                }
                
                if (isListening) {
                    try { recognition.start(); } catch(e) {}
                }
            };
            
            recognition.start();
        });
        
        document.getElementById('stop-btn').addEventListener('click', () => {
            isListening = false;
            if (pauseTimer) { clearTimeout(pauseTimer); pauseTimer = null; }
            
            // حفظ آخر جملة
            if (currentSentence.trim().length >= 5) {
                addUniqueSentence(currentSentence.trim());
            }
            
            if (recognition) { recognition.abort(); recognition = null; }
            
            document.getElementById('live-box').textContent = '⏹️ تم الإيقاف.';
            document.getElementById('live-box').className = 'live-box';
            document.getElementById('mic-icon').className = 'mic-icon';
            document.getElementById('status-text').textContent = 'في انتظار البدء...';
            document.getElementById('start-btn').disabled = false;
            document.getElementById('stop-btn').disabled = true;
            currentSentence = '';
        });
        
        console.log('👂 صفحة استمع للمحيط جاهزة! (إصدار فلتر ذكي)');
    </script>
</body>
</html>
